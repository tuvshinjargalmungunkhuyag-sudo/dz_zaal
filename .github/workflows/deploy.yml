name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/dz-zaal-backend:latest ./backend
          docker push $ECR_REGISTRY/dz-zaal-backend:latest

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "$EC2_SSH_KEY" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ec2-user@$EC2_HOST "
              aws ecr get-login-password --region ap-northeast-1 | \
                docker login --username AWS --password-stdin $ECR_REGISTRY
              docker pull $ECR_REGISTRY/dz-zaal-backend:latest
              docker stop dz-zaal-backend || true
              docker rm dz-zaal-backend || true
              docker run -d \
                --name dz-zaal-backend \
                --restart unless-stopped \
                --env-file ~/backend/.env \
                -p 3000:3000 \
                $ECR_REGISTRY/dz-zaal-backend:latest
            "
          rm /tmp/deploy_key
